<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paisapreneur AI</title>
  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #0A0A0A; color: white; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 900px; width: 100%; padding: 40px 20px; }
    h1 { font-size: 42px; text-align: center; }
    .highlight { color: #6366f1; }
    .input-box { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
    input { padding: 15px; font-size: 16px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; width: 100%; box-sizing: border-box; }
    button { padding: 15px; background: #6366f1; color: white; font-weight: bold; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    .card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-top: 20px; }
    .loading { display: none; text-align: center; color: #888; }
    
    /* Chat UI */
    .chat-section { display: none; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
    .chat-window { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; border: 1px solid #333; padding: 15px; border-radius: 8px; background: #0f0f0f; }
    .msg { padding: 10px 15px; border-radius: 8px; max-width: 80%; }
    .user { background: #333; align-self: flex-end; }
    .ai { background: #1e1b4b; align-self: flex-start; color: #a5b4fc; }
    .chat-input { display: flex; gap: 10px; }
    
    /* Monetization */
    .upgrade-banner { background: linear-gradient(90deg, #b45309, #d97706); padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 20px; cursor: pointer;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Build a <span class="highlight">Profitable Business</span></h1>
    
    <div class="input-box">
      <input id="industry" placeholder="e.g. AI Agency, Cloud Kitchen" />
      <button onclick="generate()">🚀 Generate Blueprint</button>
    </div>

    <div class="loading" id="loading"><h2>🤖 Agents are thinking... (10-15s)</h2></div>

    <div id="result"></div>
    
    <div class="chat-section" id="chat-section">
      <h3 style="display:flex; justify-content:space-between; align-items:center;">
        <span>💬 AI Mentor Chat</span>
        <span style="font-size:12px; background:#fbbf24; color:black; padding:4px 8px; border-radius:4px;">Free limits apply</span>
      </h3>
      <div class="chat-window" id="chat-window">
        <div class="msg ai">I have reviewed your blueprint. What execution blockers can I help you clear?</div>
      </div>
      <div class="chat-input">
        <input id="chat-msg" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') sendChat()" />
        <button onclick="sendChat()">Send</button>
      </div>
      <div class="upgrade-banner" onclick="alert('Proceeding to Elite Checkout...')">
        👑 Unlock Elite AI Mentor (₹999) for Unlimited Growth Playbooks
      </div>
    </div>
  </div>

  <script>
    let currentBlueprint = null;

    async function generate() {
      const industry = document.getElementById("industry").value;
      if(!industry) return alert("Enter industry");
      
      document.getElementById("loading").style.display = "block";
      document.getElementById("result").innerHTML = "";
      document.getElementById("chat-section").style.display = "none";

      try {
          const res = await fetch(`/generate?industry=${encodeURIComponent(industry)}`);
          if (!res.ok) {
              const err = await res.json();
              throw new Error(err.detail || "Error");
          }
          const data = await res.json();
          currentBlueprint = data;
          
          document.getElementById("loading").style.display = "none";
          document.getElementById("chat-section").style.display = "block";
          
          document.getElementById("result").innerHTML = `
            <div class="card">
              <h2 style="margin-top:0;">${data.business_name}</h2>
              <p><i>${data.tagline}</i></p>
              <hr style="border-color:#333;">
              <p><b>Model:</b> ${data.business_model}</p>
              <p><b>Revenue:</b> ${data.revenue_streams && data.revenue_streams.length > 0 ? data.revenue_streams[0].model + ' ~ ' + data.revenue_streams[0].expected_monthly : "N/A"}</p>
              <p><b>Timeline Preview:</b> ${data.timeline && data.timeline.length > 0 ? data.timeline[0].tasks.join(', ') : "N/A"}</p>
            </div>
          `;
      } catch (err) {
          document.getElementById("loading").style.display = "none";
          alert(err.message);
      }
    }

    async function sendChat() {
        const input = document.getElementById('chat-msg');
        const text = input.value.trim();
        if(!text) return;
        
        input.value = "";
        
        const win = document.getElementById('chat-window');
        win.innerHTML += `<div class="msg user">${text}</div>`;
        win.scrollTop = win.scrollHeight;
        
        try {
            const contextStr = currentBlueprint ? JSON.stringify({name: currentBlueprint.business_name, target: currentBlueprint.target_audience}) : "";
            
            const req = await fetch("/api/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: text, blueprint_context: contextStr})
            });
            const res = await req.json();
            
            win.innerHTML += `<div class="msg ai">${res.reply}</div>`;
            win.scrollTop = win.scrollHeight;
            
        } catch(err) {
            win.innerHTML += `<div class="msg ai" style="color:red;">Error connecting to Mentor.</div>`;
        }
    }
  </script>
</body>
</html>
