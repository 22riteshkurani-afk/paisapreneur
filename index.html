<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Paisapreneur AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-xl">
  
  <h1 class="text-2xl font-bold mb-4 text-center">🚀 Paisapreneur AI</h1>

  <input 
    id="industry"
    type="text"
    placeholder="Enter industry (e.g. fitness, AI, food)"
    class="w-full p-3 border rounded-lg mb-4"
  />

  <button 
    onclick="generateIdea()"
    class="w-full bg-blue-600 text-white p-3 rounded-lg"
  >
    Generate Idea
  </button>

  <div id="loading" class="text-center mt-4 hidden">⏳ Generating...</div>

  <div id="result" class="mt-6 hidden">
    <h2 class="text-xl font-bold mb-2" id="idea_name"></h2>

    <p><b>Description:</b> <span id="description"></span></p>
    <p><b>Target Market:</b> <span id="target"></span></p>
    <p><b>Startup Cost:</b> <span id="cost"></span></p>
    <p><b>Revenue Model:</b> <span id="revenue"></span></p>

    <ul id="steps" class="list-disc ml-6 mt-2"></ul>

    <button 
      onclick="downloadJSON()"
      class="mt-4 bg-green-600 text-white px-4 py-2 rounded"
    >
      Download JSON
    </button>
  </div>

</div>

<script>
async function generateIdea() {
    const industry = document.getElementById("industry").value;

    if (!industry) {
        alert("Please enter an industry");
        return;
    }

    try {
        const res = await fetch(
            `https://paisapreneur.onrender.com/generate?industry=${industry}`
        );

        const data = await res.json();

        // 🔥 SHOW RESULT DIV
        document.getElementById("result").classList.remove("hidden");

        // Fill values
        document.getElementById("description").innerText = data.description;
        document.getElementById("target").innerText = data.target_market;
        document.getElementById("cost").innerText = data.startup_cost;
        document.getElementById("revenue").innerText = data.revenue_model;

        // Steps
        const stepsList = document.getElementById("steps");
        stepsList.innerHTML = "";
        data.steps.forEach(step => {
            const li = document.createElement("li");
            li.textContent = step;
            stepsList.appendChild(li);
        });

    } catch (error) {
        alert("Error generating idea");
    }
}
</script>

</body>
</html>
